    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {

    line-height: 1.6;

    padding: 22px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;

  .header p { font-size: 0.82rem; opacity: 0.85; margin-top: 3px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 16px 20px; }
  .layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }

    max-height: calc(100vh - 130px);
    overflow-y: auto;
    border: 1px solid var(--border);

  /* Search */
  .search-box {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .search-box:focus { border-color: var(--primary); }

  /* City Grid */
  .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 14px; }
  .city-btn {

    border-radius: 6px;

    text-align: center;
    white-space: nowrap;
    color: var(--text);
    font-family: inherit;
  }
  .city-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .city-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }

  .pref-options { display: flex; flex-wrap: wrap; gap: 4px; }
  .pref-chip {
    padding: 4px 9px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 0.76rem;
    transition: all 0.15s;
    white-space: nowrap;
    color: var(--text);
    font-family: inherit;
  }
  .pref-chip:hover { border-color: #3b82f6; background: #eff6ff; }
  .pref-chip.active { background: #dbeafe; border-color: #3b82f6; color: #1e40af; font-weight: 500; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 6px;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }

  .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }

  .stats-bar {

    justify-content: space-between;

    color: var(--text-secondary);

    border-radius: 8px;
    border: 1px solid var(--border);

    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;

    color: #1e40af;
    display: flex;
    align-items: flex-start;
    gap: 8px;

    font-size: 1.1rem;
    line-height: 1;
    opacity: 0.5;
    background: none;
    border: none;
    color: inherit;
  }
  .tips-banner .close-tip:hover { opacity: 1; }

  .hospital-card {
    background: var(--card-bg);

    border: 1px solid var(--border);

  .badge {

    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.3px;

  }
</style>

  {id:92,name:"丽水市人民医院",city:"丽水",level:"三甲",address:"丽水市莲都区大众街15号",depts:["心血管内科","骨科","妇产科"],pros:["老牌三甲带教有经验"],cons:["院区老旧","与中心医院竞争"],口碑:"莲都区老市民认可度高",url:"www.ls-hospital.com",tags:["teaching","retention"],salary:"实习生无工资；留用后年薪约10-14万"},

];

var cities = ["杭州","宁波","温州","绍兴","嘉兴","湖州","金华","衢州","舟山","台州","丽水"];

var prefTagMap = {
  "hands-on": "操作机会多",
  "specialty": "专科特色强",
  "emergency": "急诊/ICU经验",
  "teaching": "带教认真负责",
  "platform": "省级大平台",
  "dorm": "有宿舍提供",
  "less-night": "夜班较少",
  "moderate": "强度适中",
  "retention": "留用机会多"
};

var activeCity = null;
var activePrefs = new Set();

// ====== 城市按钮初始化 ======
function initCityGrid() {
  var grid = document.getElementById('cityGrid');
  var html = '';
  for (var i = 0; i < cities.length; i++) {
    html += '<button class="city-btn" data-city="' + cities[i] + '" onclick="toggleCity(\'' + cities[i] + '\')">' + cities[i] + '</button>';
  }
  grid.innerHTML = html;
}

// ====== 切换城市 ======
function toggleCity(city) {
  activeCity = activeCity === city ? null : city;
  var btns = document.querySelectorAll('.city-btn');
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    if (b.getAttribute('data-city') === activeCity) {
      b.classList.add('active');
    } else {
      b.classList.remove('active');
    }
  }
  applyFilter();
}

// ====== 偏好点击 ======
(function bindPrefChips() {
  var chips = document.querySelectorAll('.pref-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].addEventListener('click', function() {
      var val = this.getAttribute('data-val');
      if (activePrefs.has(val)) {
        activePrefs.delete(val);
        this.classList.remove('active');
      } else {
        activePrefs.add(val);
        this.classList.add('active');
      }
      applyFilter();
    });
  }
})();

// ====== 计算匹配分数 ======
function computeScore(hospital, prefs) {
  if (prefs.size === 0) return 0;
  var score = 0;
  var maxScore = prefs.size;
  prefs.forEach(function(pref) {
    if (hospital.tags.indexOf(pref) !== -1) score++;
  });
  return Math.round((score / maxScore) * 100);
}

// ====== 筛选与推荐 ======
function applyFilter() {
  var searchTerm = document.getElementById('searchBox').value.trim().toLowerCase();
  var filtered = hospitals.slice();

  // 搜索过滤
  if (searchTerm) {
    filtered = filtered.filter(function(h) {
      return h.name.toLowerCase().indexOf(searchTerm) !== -1 ||
             h.city.toLowerCase().indexOf(searchTerm) !== -1 ||
             h.depts.some(function(d) { return d.toLowerCase().indexOf(searchTerm) !== -1; }) ||
             h.address.toLowerCase().indexOf(searchTerm) !== -1;
    });
  }

  // 城市筛选
  if (activeCity) {
    filtered = filtered.filter(function(h) { return h.city === activeCity; });
  }

  // 偏好匹配
  var hasPrefs = activePrefs.size > 0;
  for (var i = 0; i < filtered.length; i++) {
    filtered[i]._score = hasPrefs ? computeScore(filtered[i], activePrefs) : 0;
  }

  if (hasPrefs) {
    filtered.sort(function(a, b) { return b._score - a._score; });
  } else {
    filtered.sort(function(a, b) {
      if (a.level === b.level) return a.id - b.id;
      return a.level === '三甲' ? -1 : 1;
    });
  }

  renderResults(filtered, hasPrefs);
}

// ====== 渲染结果 ======
function renderResults(hospitals, hasPrefs) {
  var statsBar = document.getElementById('statsBar');
  var list = document.getElementById('hospitalList');
  var cityLabel = activeCity || '浙江省';
  var sanjiaCount = 0, sanyiCount = 0;
  for (var i = 0; i < hospitals.length; i++) {
    if (hospitals[i].level === '三甲') sanjiaCount++;
    else sanyiCount++;
  }

  statsBar.innerHTML = '<span><strong>' + cityLabel + '</strong> 共 <strong>' + hospitals.length + '</strong> 家医院' +
    (hasPrefs ? '（按偏好匹配度排序）' : '（三甲优先排列）') +
    '</span><span style="font-size:0.78rem">三甲 ' + sanjiaCount + ' 家 &middot; 三乙 ' + sanyiCount + ' 家</span>';

  if (hospitals.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#94a3b8;font-size:0.9rem;">未找到匹配的医院，请调整筛选条件</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < hospitals.length; i++) {
    var h = hospitals[i];
    var isRecommended = hasPrefs && h._score >= 50 && i < 5;
    var scoreHTML = hasPrefs ? '<span class="match-score">匹配度 ' + h._score + '%</span>' : '';

    var matchedTags = '';
    if (hasPrefs) {
      var matched = [];
      for (var t = 0; t < h.tags.length; t++) {
        if (activePrefs.has(h.tags[t])) {
          matched.push('<span class="badge badge-match">' + prefTagMap[h.tags[t]] + '</span>');
        }
      }
      matchedTags = matched.join(' ');
    }

    var deptTags = '';
    for (var d = 0; d < h.depts.length; d++) {
      deptTags += '<span class="tag">' + h.depts[d] + '</span>';
    }

    var recommendBadge = isRecommended ? '<span class="badge badge-recommend">推荐</span>' : '';
    var cardClass = 'hospital-card';
    if (isRecommended) cardClass += ' recommended';

    html +=
    '<div class="' + cardClass + '">' +
      '<div class="card-header">' +
        '<div style="flex:1;min-width:0">' +
          '<h3>' + h.name + '</h3>' +
          '<div class="badge-row" style="margin-top:4px">' +
            '<span class="badge ' + (h.level === '三甲' ? 'badge-sanja' : 'badge-sanyi') + '">' + h.level + '</span>' +
            '<span class="badge badge-city">' + h.city + '</span>' +
            matchedTags +
            recommendBadge +
          '</div>' +
        '</div>' +
        scoreHTML +
      '</div>' +
      '<div class="card-meta">' +
        '<dl><dt>地址</dt><dd>' + h.address + '</dd></dl>' +
        '<dl><dt>官网</dt><dd>' + h.url + '</dd></dl>' +
      '</div>' +
      '<div class="card-detail">' +
        '<div class="detail-section"><strong>重点科室</strong><div class="tag-list">' + deptTags + '</div></div>' +
        '<div class="detail-section" style="margin-top:4px">' +
          '<strong>实习生评价</strong>' +
          '<div style="color:#166534">优点：' + h.pros.join('；') + '</div>' +
          '<div style="color:#dc2626">不足：' + h.cons.join('；') + '</div>' +
        '</div>' +
        '<div class="detail-section" style="margin-top:4px"><strong>往届口碑：</strong>' + h.口碑 + '</div>' +
        '<div class="salary-info">薪资参考：' + h.salary + '</div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

// ====== 重置 ======
function resetAll() {
  activeCity = null;
  activePrefs.clear();
  document.getElementById('searchBox').value = '';
  var btns = document.querySelectorAll('.city-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var chips = document.querySelectorAll('.pref-chip');
  for (var j = 0; j < chips.length; j++) chips[j].classList.remove('active');
  applyFilter();
}

// ====== 关闭提示 ======
function dismissTip() {
  document.getElementById('tipsBanner').style.display = 'none';
}

// ====== 返回顶部按钮 ======
window.addEventListener('scroll', function() {
  var btn = document.getElementById('backToTop');
  if (window.scrollY > 400) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

// ====== 启动 ======
initCityGrid();
applyFilter();
</script>
